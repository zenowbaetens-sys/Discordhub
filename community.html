<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Community - DiscordHub</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<nav>

<div class="logo">
⚡ DiscordHub
</div>


<div class="menu">

<a href="index.html">Home</a>
<a href="communities.html">Communities</a>

</div>

</nav>

</header>



<section class="hero">


<div class="card">


<h1 id="communityTitle">
Community naam
</h1>


<p id="communityDescription">
Beschrijving
</p>


<p id="communityCategory">
Categorie
</p>


<button class="btn">
🔗 Join Discord
</button>


</div>


</section>



<footer>

© 2026 DiscordHub

</footer>


<script>


let selected = JSON.parse(localStorage.getItem("selectedCommunity"));


if(selected){

document.getElementById("communityTitle").innerHTML =
selected.name;


document.getElementById("communityDescription").innerHTML =
selected.desc;


document.getElementById("communityCategory").innerHTML =
"Categorie: " + selected.category;

}


</script>


</body>

</html>
